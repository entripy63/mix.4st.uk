<!DOCTYPE html>
<html>

<head>
  <title>Player</title>
  <meta content="text/html; charset=utf-8" http-equiv="Content-Type" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="common.css?v=2">
  <link rel="stylesheet" href="player.css?v=2">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎧</text></svg>">
</head>

<body>
  <div class="container">
    <div class="left-column">
      <div id="mixBrowser">
        <div id="browserModeSelector">
          <button class="mode-btn active" data-mode="dj" title="Browse by DJ (Ctrl+D)">
            <span class="mode-icon">👤</span>
            <span class="mode-label">DJ</span>
          </button>
          <button class="mode-btn" data-mode="all" title="All DJs (Ctrl+A)">
            <span class="mode-icon">📋</span>
            <span class="mode-label">All</span>
          </button>
          <button class="mode-btn" data-mode="live" title="Live Streams (Ctrl+L)">
            <span class="mode-icon">📡</span>
            <span class="mode-label">Live</span>
          </button>
          <button class="mode-btn" data-mode="search" title="Search (Ctrl+F)">
            <span class="mode-icon">🔍</span>
            <span class="mode-label">Search</span>
          </button>
          <button class="mode-btn" data-mode="favourites" title="Favourites (Ctrl+V)">
            <span class="mode-icon">❤️</span>
            <span class="mode-label">Favourites</span>
          </button>
          <button class="settings-btn" onclick="showSettings()" title="Settings">⚙️</button>
          <button class="help-btn" onclick="showHelp()" title="Keyboard shortcuts (?)">?</button>
        </div>
        <div id="settingsModal" class="modal" style="display: none;">
          <div class="modal-content">
            <button class="modal-close" onclick="hideSettings()">×</button>
            <h2>Settings</h2>
            <div class="settings-group">
              <label class="setting-label">After Play Now:</label>
              <div class="setting-options">
                <label class="radio-label">
                  <input type="radio" name="afterPlayNow" value="stop"
                    onchange="updateSetting('afterPlayNow', this.value)">
                  Stop
                </label>
                <label class="radio-label">
                  <input type="radio" name="afterPlayNow" value="loop"
                    onchange="updateSetting('afterPlayNow', this.value)">
                  Loop
                </label>
                <label class="radio-label">
                  <input type="radio" name="afterPlayNow" value="continue"
                    onchange="updateSetting('afterPlayNow', this.value)">
                  Continue with Queue
                </label>
              </div>
            </div>
            <div class="settings-group">
              <label class="checkbox-label">
                <input type="checkbox" id="showHiddenMixesCheckbox" onchange="updateShowHiddenMixes(this.checked)">
                Show Hidden Mixes
              </label>
            </div>
            <div class="settings-group">
              <label class="checkbox-label">
                <input type="checkbox" id="visualiserEnabledCheckbox" onchange="updateVisualiserEnabled(this.checked)">
                Audio Visualiser
              </label>
            </div>
            <div class="settings-group">
              <label class="checkbox-label">
                <input type="checkbox" id="bpmEnabledCheckbox" onchange="updateBpmEnabled(this.checked)">
                BPM Detection
              </label>
            </div>
            <div class="settings-group">
              <label class="checkbox-label">
                <input type="checkbox" id="timedFadesCheckbox" onchange="updateTimedFadesEnabled(this.checked)">
                Timed Fades
              </label>
              <div id="timedFadesOptions" class="fadeout-options" style="display:none">
                <div class="fadeout-row">
                  <label>
                    <select id="tfType" onchange="switchTimedFadeType(this.value)">
                      <option value="fadeout">Fadeout then Pause</option>
                      <option value="fadein">Play then Fade In</option>
                    </select>
                  </label>
                  <label class="checkbox-label tf-active-label">
                    <input type="checkbox" id="tfActive" onchange="updateTimedFadeSetting()"> Active
                  </label>
                </div>
                <div class="fadeout-row">
                  <label>Fade:
                    <select id="tfDuration" onchange="updateTimedFadeSetting()">
                      <option value="1">1s</option>
                      <option value="2">2s</option>
                      <option value="3">3s</option>
                      <option value="5">5s</option>
                      <option value="10">10s</option>
                      <option value="20">20s</option>
                      <option value="30">30s</option>
                      <option value="60">60s</option>
                    </select>
                  </label>
                  <label>
                    <select id="tfMode" onchange="updateTimedFadeSetting()">
                      <option value="at">At</option>
                      <option value="after">After</option>
                    </select>
                  </label>
                  <input type="time" id="tfTime" value="23:00" onchange="updateTimedFadeSetting()">
                </div>
                <div class="fadeout-row" id="tfRepeatRow">
                  <label>Repeat:
                    <select id="tfRepeat" onchange="updateTimedFadeSetting()">
                      <option value="none">None</option>
                      <option value="weekdays">Week Days</option>
                      <option value="all">All Days</option>
                    </select>
                  </label>
                </div>
                <div class="fadeout-row" id="tfStreamRow" style="display:none">
                  <label class="checkbox-label tf-active-label">
                    <input type="checkbox" id="tfPlayStream" onchange="updateTimedFadeSetting()">
                    Play First User Stream
                  </label>
                </div>
                <div id="tfStatus" class="fadeout-status"></div>
              </div>
            </div>
          </div>
        </div>
        <div id="helpModal" class="modal" style="display: none;">
          <div class="modal-content">
            <button class="modal-close" onclick="hideHelp()">×</button>
            <h2>Keyboard Shortcuts</h2>
            <table class="shortcuts-table">
              <tr>
                <td><kbd>Space</kbd></td>
                <td>Play / Pause</td>
              </tr>
              <tr>
                <td><kbd>Ctrl</kbd>+<kbd>↓</kbd></td>
                <td>Next in queue</td>
              </tr>
              <tr>
                <td><kbd>Ctrl</kbd>+<kbd>↑</kbd></td>
                <td>Previous in queue</td>
              </tr>
              <tr>
                <td><kbd>Ctrl</kbd>+<kbd>D</kbd></td>
                <td>DJ mode</td>
              </tr>
              <tr>
                <td><kbd>Ctrl</kbd>+<kbd>A</kbd></td>
                <td>All DJs mode</td>
              </tr>
              <tr>
                <td><kbd>Ctrl</kbd>+<kbd>F</kbd></td>
                <td>Search mode</td>
              </tr>
              <tr>
                <td><kbd>Ctrl</kbd>+<kbd>V</kbd></td>
                <td>Favourites mode</td>
              </tr>
              <tr>
                <td><kbd>Ctrl</kbd>+<kbd>L</kbd></td>
                <td>Live mode</td>
              </tr>
              <tr>
                <td><kbd>Esc</kbd></td>
                <td>Close this help</td>
              </tr>
            </table>
          </div>
        </div>
        <div id="djButtons">
          <button onclick="loadDJ('mixes/trip')">trip-</button>
          <button onclick="loadDJ('mixes/izmar')">Izmar</button>
          <button onclick="loadDJ('mixes/haze')">haze</button>
          <button onclick="loadDJ('mixes/rpfr')">rpfr</button>
          <button onclick="loadDJ('mixes/jx3p')">jx3p</button>
          <button onclick="loadDJ('mixes/gmanual')">gmanual</button>
        </div>
        <div id="djDropdown" style="display: none;">
          <div id="djRow" style="display: flex; gap: 8px; align-items: center;">
            <select id="djSelect" style="flex: 1;">
              <option value="">Select a DJ...</option>
              <!-- Options populated dynamically by buildDJDropdown() -->
            </select>
          </div>
        </div>
        <div id="presetDropdown" style="display: none;">
          <div id="presetRow" style="display: flex; gap: 8px; align-items: center;">
            <select id="presetSelect" style="flex: 1;">
              <option value="">Select a preset...</option>
            </select>
            <button id="presetAddAllBtn" class="tab-action-btn" onclick="addAllPresetStreams()" title="Add all to user streams" style="display: none;">＋</button>
          </div>
        </div>
        <div id="searchBox" style="display: none;">
          <input type="text" id="searchInput" placeholder="Search mixes and streams..." autocomplete="off">
          <div id="searchInfo"></div>
        </div>
        <div id="groupFilters"></div>
        <div id="mixList"></div>
      </div>

    </div>
    <div class="middle-column">
      <div id="middleTabs">
        <button class="middle-tab active" data-tab="queue" onclick="switchMiddleTab('queue')">Mix Queue</button>
        <button class="middle-tab" data-tab="userStreams" onclick="switchMiddleTab('userStreams')">User Streams</button>
        <div id="queueTabActions" class="tab-actions">
          <button onclick="skipPrev()" class="tab-action-btn" title="Previous in queue">▲</button>
          <button onclick="skipNext()" class="tab-action-btn" title="Next in queue">▼</button>
          <button onclick="shuffleQueue()" class="tab-action-btn" title="Shuffle queue">⇄</button>
          <button id="loopTabBtn" onclick="toggleLoop()" class="tab-action-btn" title="Loop queue">⟳</button>
          <button onclick="loadQueueFromFile()" class="tab-action-btn" title="Load queue from file">↥</button>
          <button onclick="saveQueueToFile()" class="tab-action-btn" title="Save queue to file">↧</button>
          <button onclick="clearQueue()" class="tab-action-btn" title="Clear queue">✕</button>
        </div>
        <div id="streamTabActions" class="tab-actions" style="display: none;">
          <button onclick="reloadLiveStreams()" class="tab-action-btn" title="Reload all streams">⟳</button>
          <button onclick="loadCollectionFromFile()" class="tab-action-btn" title="Load streams from file">↥</button>
          <button onclick="saveCollectionToFile()" class="tab-action-btn" title="Save streams to file">↧</button>
          <button onclick="clearAllStreams()" class="tab-action-btn" title="Clear all streams">✕</button>
        </div>
      </div>
      <div id="queueTab" class="middle-tab-content">
        <div id="queue"></div>
        <div id="localFiles">
          <label class="file-input-label">
            <input type="file" id="fileInput" accept="audio/*" multiple hidden>
            Add Local Files
          </label>
        </div>
      </div>
      <div id="userStreamsTab" class="middle-tab-content" style="display: none;">
        <div id="userStreamsList"></div>
      </div>
    </div>
    <div class="right-column">
      <div id="waveformContainer">
        <canvas id="waveform"></canvas>
        <canvas id="visualiserCanvas"></canvas>
      </div>
      <div id="waveformResizeHandle"></div>
      <div id="visualiserModes">
        <button class="vis-mode-btn active" data-vis="spectrum" title="Spectrum">▮▮▮</button>
        <button class="vis-mode-btn" data-vis="waveform" title="Waveform">∿</button>
        <button class="vis-mode-btn bpm-only" data-vis="flux" title="Spectral flux">⚡</button>
        <button class="vis-mode-btn bpm-only" data-vis="autocorr" title="Autocorrelation">∞</button>
        <button class="vis-mode-btn" data-vis="off" title="Visualiser off">✕</button>
      </div>
      <audio id="audioPlayer" crossorigin="anonymous" preload="auto"></audio>
      <div id="audioControls">
        <button id="playPauseBtn" class="control-btn" title="Play/Pause (Space)">▶</button>
        <span id="timeDisplay">0:00 / 0:00</span>
        <span id="bpmDisplay" style="display:none"></span>
        <div id="volumeControl">
          <button id="muteBtn" class="control-btn" title="Mute">🔊</button>
          <input type="range" id="volumeSlider" min="0" max="100" value="50" title="Volume">
        </div>
      </div>
      <div id="nowPlaying"></div>
      <div id="streamTitle"></div>
      <div id="coverArt"></div>
      <div id="trackList"></div>
    </div>
  </div>
  <div id="presetsModal" class="modal" onclick="hidePresetsMenu()" style="display: none;">
    <div class="modal-content" onclick="event.stopPropagation()"
      style="background: #252542; border-radius: 10px; padding: 16px; max-width: 300px;">
      <h2 style="margin-top: 0; margin-bottom: 16px; font-size: 16px;">Add Playlists</h2>
      <div id="presetsList" style="display: flex; flex-direction: column; gap: 8px;"></div>
    </div>
  </div>

  <div id="confirmDialog" class="modal" style="display: none;">
    <div class="confirm-content modal-content" onclick="event.stopPropagation()"
      style="background: #252542; border-radius: 10px; padding: 24px; max-width: 320px;">
      <h2 class="confirm-title" style="margin-top: 0; margin-bottom: 12px; font-size: 16px;"></h2>
      <p class="confirm-message" style="margin: 0 0 20px 0; color: #ccc; font-size: 14px;"></p>
      <div style="display: flex; gap: 10px; justify-content: flex-end;">
        <button class="confirm-cancel"
          style="padding: 10px 16px; background: #3d3d5c; border: none; border-radius: 6px; color: #e0e0e0; cursor: pointer; transition: background 0.2s; font-size: 14px;">Cancel</button>
        <button class="confirm-confirm"
          style="padding: 10px 16px; background: #c0475c; border: none; border-radius: 6px; color: #fff; cursor: pointer; transition: background 0.2s; font-size: 14px; font-weight: bold;">Delete</button>
      </div>
    </div>
  </div>

  <script src="core.js?v=2"></script>
  <script src="mixes.js?v=2"></script>
  <script src="queue.js?v=2"></script>
  <script src="queuestore.js?v=2"></script>
  <script src="vendor/icecast-metadata-player-1.17.13.main.min.js"></script>
  <script src="stream-player.js?v=2"></script>
  <script src="player.js?v=2"></script>
  <script src="tempo.js?v=2"></script>
  <script src="visualiser.js?v=2"></script>
  <script src="player-mix.js?v=2"></script>
  <script src="livedata.js?v=2"></script>
  <script src="modals.js?v=2"></script>
  <script src="livestore.js?v=2"></script>
  <script src="liveui.js?v=2"></script>
  <script src="search.js?v=2"></script>
  <script src="browser.js?v=2"></script>
  <script src="restore.js?v=2"></script>
  <script>
    // Initialize mixes config and player
    (async function initPlayer() {
      await loadMixesConfig();
    })();
  </script>
</body>

</html>
