name = "stream-proxy"
main = "cloudflare-worker.js"
compatibility_date = "2025-05-22"
# enable_request_signal makes request.signal actually fire on client disconnect
# (feature shipped 2025-05-22). Without it, the signal: request.signal passed to
# fetch() in cloudflare-worker.js is inert. CF already tears down subrequests on
# disconnect natively, so this is belt-and-suspenders parity with the Deno proxy.
compatibility_flags = ["enable_request_signal"]
